<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Developer Full-Stack Analytics</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 40px; background: #f5f7fa; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #d35400; border-bottom: 2px solid #f39c12; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"] { width: 80%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { padding: 10px 20px; background: #2980b9; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .badge-high { background: #e74c3c; color: white; }
        .badge-normal { background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI-Empowered Operational Portal</h1>
    <p><strong>System Status:</strong> Java Backend <-> H2 Database <-> Web UI <-> Analytics Module Matrix</p>
    
    <div class="form-group">
        <label for="featureInput">Submit Operational Features for ML Classification:</label>
        <input type="text" id="featureInput" placeholder="e.g. System load is high with critical transaction errors">
        <button onclick="runPrediction()">Run Prediction</button>
    </div>

    <h2>Mined Knowledge Record Logs</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Extracted Feature Attributes</th>
                <th>Mined Value Metric</th>
                <th>Classification Decision Output</th>
            </tr>
        </thead>
        <tbody id="dataTableBody">
            </tbody>
    </table>
</div>

<script>
    const API_URL = '/api/analytics';

    async function loadTable() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const badgeClass = item.status.includes('HIGH') ? 'badge-high' : 'badge-normal';
                tbody.innerHTML += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.features}</td>
                        <td>${item.predictionValue.toFixed(2)}</td>
                        <td><span class="badge ${badgeClass}">${item.status}</span></td>
                    </tr>
                `;
            });
        } catch (err) { console.error("Data tracking error: ", err); }
    }

    async function runPrediction() {
        const inputVal = document.getElementById('featureInput').value;
        if(!inputVal) return alert("Please type structural features first!");

        try {
            await fetch(`${API_URL}/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features: inputVal })
            });
            document.getElementById('featureInput').value = '';
            loadTable();
        } catch (err) { console.error("Prediction loop exception: ", err); }
    }

    // Run table scanning immediately on load lifecycle
    loadTable();
</script>
</body>
</html>
